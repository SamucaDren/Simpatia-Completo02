events {}

http {

    include /etc/nginx/mime.types;

    server {
        listen 80;

        root /usr/share/nginx/html/site-principal;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://localhost:3000/;
        }

        location /acessibilidade-checker/ {
            alias /usr/share/nginx/html/acessibilidade-checker/;
            try_files $uri $uri/ /acessibilidade-checker/index.html;
        }

        location /gerador-plano-aula/ {
            alias /usr/share/nginx/html/gerador-plano-aula/;
            try_files $uri $uri/ /gerador-plano-aula/index.html;
        }

        location /gerador-plano-estudo/ {
            alias /usr/share/nginx/html/gerador-plano-estudo/;
            try_files $uri $uri/ /gerador-plano-estudo/index.html;
        }

        location /gerador-questoes-descritivas/ {
            alias /usr/share/nginx/html/gerador-questoes-descritivas/;
            try_files $uri $uri/ /gerador-questoes-descritivas/index.html;
        }

        location /simpatico/ {
            alias /usr/share/nginx/html/simpatico/;
            try_files $uri $uri/ /simpatico/index.html;
        }

        location /ajuda-ai/ {
            alias /usr/share/nginx/html/ajuda-ai/;
            try_files $uri $uri/ /ajuda-ai/index.html;
        }
    }
}