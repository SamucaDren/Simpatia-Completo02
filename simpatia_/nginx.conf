events {}

http {

    include /etc/nginx/mime.types;

    server {
        listen 80;

        root /usr/share/nginx/html/site-principal;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:3000;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Redirecionamentos para URLs sem barra final
        location = /acessibilidade-checker {
            return 301 /acessibilidade-checker/;
        }

        location = /gerador-plano-aula {
            return 301 /gerador-plano-aula/;
        }

        location = /gerador-plano-estudo {
            return 301 /gerador-plano-estudo/;
        }

        location = /gerador-questoes-descritivas {
            return 301 /gerador-questoes-descritivas/;
        }

        location = /gerador-questoes-objetivas {
            return 301 /gerador-questoes-objetivas/;
        }

        location = /simpatico {
            return 301 /simpatico/;
        }

        location = /ajuda-ai {
            return 301 /ajuda-ai/;
        }

        location = /quiz-simpatia {
            return 301 /quiz-simpatia/;
        }

        location = /corretor-questoes-descritivas {
            return 301 /corretor-questoes-descritivas/;
        }   

        location = /oratoria {
            return 301 /oratoria/;
        }       

        location ^~ /acessibilidade-checker/ {
            alias /usr/share/nginx/html/acessibilidade-checker/;
            try_files $uri $uri/ /acessibilidade-checker/index.html;
        }

        location ^~ /gerador-plano-aula/ {
            alias /usr/share/nginx/html/gerador-plano-aula/;
            try_files $uri $uri/ /gerador-plano-aula/index.html;
        }

        location ^~ /gerador-plano-estudo/ {
            alias /usr/share/nginx/html/gerador-plano-estudo/;
            try_files $uri $uri/ /gerador-plano-estudo/index.html;
        }

        location ^~ /gerador-questoes-descritivas/ {
            alias /usr/share/nginx/html/gerador-questoes-descritivas/;
            try_files $uri $uri/ /gerador-questoes-descritivas/index.html;
        }

        location ^~ /simpatico/ {
            alias /usr/share/nginx/html/simpatico/;
            try_files $uri $uri/ /simpatico/index.html;
        }

        location ^~ /ajuda-ai/ {
            alias /usr/share/nginx/html/ajuda-ai/;
            try_files $uri $uri/ /ajuda-ai/index.html;
        }

        location ^~ /gerador-questoes-objetivas/ {
            alias /usr/share/nginx/html/gerador-questoes-objetivas/;
            try_files $uri $uri/ /gerador-questoes-objetivas/index.html;
        }
        
        location ^~ /quiz-simpatia/ {
            alias /usr/share/nginx/html/quiz-simpatia/;
            try_files $uri $uri/ /quiz-simpatia/index.html;
        }

        location ^~ /corretor-questoes-descritivas/ {
            alias /usr/share/nginx/html/corretor-questoes-descritivas/;
            try_files $uri $uri/ /corretor-questoes-descritivas/index.html;
        } 
        location ^~ /oratoria/ {
            alias /usr/share/nginx/html/oratoria/;
            try_files $uri $uri/ /oratoria/index.html;
        }         
    }
}