name: CI/CD SIMPATIA Pipeline

on:
  push:
    branches:
      - main # dispara ao enviar código da branch main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validar Dependências do Servidor
        run: |
          cd api
          npm install

      - name: Disparar Deploy no Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"